<title>AI交易助手</title>
<style>
:root{--bg:#0a0e17;--c1:#111827;--c2:#1a2332;--bd:#2a3548;--t1:#e5e7eb;--t2:#9ca3af;--t3:#6b7280;--blue:#3b82f6;--cyan:#06b6d4;--grn:#10b981;--red:#ef4444;--org:#f59e0b;--purp:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.6}

.top{padding:14px 20px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--c1)}
.top h1{font-size:17px;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.top .t{font-size:10px;color:var(--t3)}

.tabs{display:flex;gap:4px;padding:10px 20px;background:var(--c1);border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--c2);cursor:pointer;font-size:11px;color:var(--t2);white-space:nowrap;transition:.15s}
.tab:hover{border-color:var(--blue)}
.tab.on{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}

.wrap{max-width:900px;margin:0 auto;padding:16px}
.sec{margin-bottom:18px}
.sec-t{font-size:13px;font-weight:700;margin-bottom:10px}

.macro{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.mc{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.mc .l{font-size:8px;color:var(--t3);margin-bottom:2px}
.mc .v{font-size:20px;font-weight:800}
.mc .s{font-size:9px;margin-top:1px}
.up{color:var(--grn)}.dn{color:var(--red)}

.qrow{display:flex;gap:6px;margin-top:8px}
.qc{flex:1;padding:8px;border-radius:8px;text-align:center;font-size:10px;font-weight:600;opacity:.3;transition:.2s}
.qc.on{opacity:1}
.qg{background:rgba(16,185,129,.12);color:var(--grn)}
.qo{background:rgba(245,158,11,.12);color:var(--org)}
.qr{background:rgba(59,130,246,.12);color:var(--blue)}
.qs{background:rgba(239,68,68,.12);color:var(--red)}

.adv-row{display:flex;gap:8px;margin-bottom:10px}
.adv-num{flex:1;background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:10px;text-align:center}
.adv-num .l{font-size:9px;color:var(--t3)}
.adv-num .v{font-size:24px;font-weight:800}
.adv-list{display:flex;flex-direction:column;gap:4px}
.adv{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;font-size:11px;display:flex;gap:8px;align-items:baseline}
.adv .tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0}
.adv .tag.b{background:rgba(16,185,129,.12);color:var(--grn)}
.adv .tag.s{background:rgba(239,68,68,.12);color:var(--red)}
.adv .tag.h{background:rgba(59,130,246,.12);color:var(--blue)}
.adv .tag.w{background:rgba(245,158,11,.12);color:var(--org)}

.sbox{display:flex;gap:6px;margin-bottom:8px}
.sinput{flex:1;background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--t1);font-size:13px;outline:none}
.sinput:focus{border-color:var(--blue)}
.sbtn{background:var(--blue);color:#fff;border:none;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.stags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.stag{font-size:9px;padding:3px 8px;border-radius:5px;background:var(--c2);border:1px solid var(--bd);color:var(--t3);cursor:pointer}
.stag:hover{color:var(--t1);border-color:var(--blue)}

.card{background:var(--c2);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:10px;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:4px}
.card-name{font-size:15px;font-weight:700}
.card-sym{font-size:10px;color:var(--t3);margin-left:4px}
.badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:6px}
.badge.buy{background:rgba(16,185,129,.1);color:var(--grn)}
.badge.sell{background:rgba(239,68,68,.1);color:var(--red)}
.badge.hold{background:rgba(6,182,212,.1);color:var(--cyan)}
.badge.clear{background:rgba(239,68,68,.18);color:var(--red);font-weight:800}
.nums{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.nums>div{background:rgba(255,255,255,.02);padding:6px;border-radius:5px;text-align:center}
.nums .l{font-size:8px;color:var(--t3)}
.nums .v{font-size:14px;font-weight:700}

/* 规则检查列表 */
.rules{margin:8px 0;font-size:11px}
.rule{display:flex;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.rule:last-child{border-bottom:none}
.rule .icon{flex-shrink:0;width:16px;text-align:center}
.rule .pass{color:var(--grn)}
.rule .fail{color:var(--red)}
.rule .warn{color:var(--org)}
.rule .name{color:var(--t2);min-width:100px}
.rule .cond{color:var(--t3);font-family:'SF Mono',Monaco,monospace;font-size:10px;flex:1}
.rule .result{font-weight:700;min-width:50px;text-align:right}

.verdict{border-radius:8px;padding:10px 14px;margin-top:10px;font-size:11px;line-height:1.6}
.verdict.buy-v{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15)}
.verdict.sell-v{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15)}
.verdict.hold-v{background:rgba(6,182,212,.06);border:1px solid rgba(6,182,212,.15)}
.verdict.clear-v{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25)}
.verdict b{font-size:10px;color:var(--purp)}

.empty{text-align:center;padding:32px;color:var(--t3);font-size:12px}
.footer{text-align:center;padding:14px;color:var(--t3);font-size:8px;border-top:1px solid var(--bd);margin-top:16px}
@media(max-width:600px){.nums{grid-template-columns:repeat(2,1fr)}.adv-row{flex-direction:column}}
</style>
</head>

// 基本面评分（通用）
function calcFund(d){
  let s=5;
  if(d.roe>=20)s+=1.5; else if(d.roe>=15)s+=1; else if(d.roe>=10)s+=0.5;
  if(d.eps_growth>=25)s+=1.5; else if(d.eps_growth>=15)s+=1; else if(d.eps_growth>=5)s+=0.3;
  if(d.peg<=0.5)s+=1; else if(d.peg<=1)s+=0.5; else if(d.peg>2.5)s-=1;
  if(d.debt_ratio<0.3)s+=0.3; else if(d.debt_ratio>0.7)s-=0.5;
  return Math.max(0,Math.min(10,s));
}

function go(){
  const v=document.getElementById("si").value.trim();
  if(!v)return;
  const qs=v.split(/[\s,，]+/).filter(Boolean);
  const found=[];
  qs.forEach(q=>{
    const k=A[q]||A[q.toLowerCase()]||A[q.toUpperCase()]||q.toUpperCase();
    if(DB[k]){found.push(k);return}
    const hit=Object.entries(DB).find(([,v])=>v.n.includes(q)||v.sym.toLowerCase().includes(q.toLowerCase()));
    if(hit)found.push(hit[0]);
  });
  const el=document.getElementById("results");
  if(!found.length){el.innerHTML=`<div class="empty">未找到「${v}」</div>`;return}
  el.innerHTML=found.map(diagnose).join("");
}

function reSearch(){
  const cards=document.querySelectorAll(".card[data-s]");
  if(!cards.length)return;
  document.getElementById("results").innerHTML=Array.from(cards).map(c=>diagnose(c.dataset.s)).join("");
}

function diagnose(sym){
  const d=DB[sym]; if(!d)return"";
  const m=MODELS[cur];

  // 逐条评估买入规则
  const buyResults = m.buyRules.map(r=>({...r, result:r.test(d)}));
  const sellResults = m.sellRules.map(r=>({...r, result:r.test(d)}));
  const clearResults = m.clearRules.map(r=>({...r, result:r.test(d)}));

  const buyPass = buyResults.filter(r=>r.result.pass);
  const buyReq = buyResults.filter(r=>r.pri==="核心"||r.pri==="必要");
  const buyReqPass = buyReq.filter(r=>r.result.pass);
  const sellTriggered = sellResults.filter(r=>r.result.pass);
  const clearTriggered = clearResults.filter(r=>r.result.pass);

  // 综合判断
  let action, actionCls;
  if(clearTriggered.length>0){
    action="🔴 清仓"; actionCls="clear";
  } else if(sellTriggered.length>=2 || sellTriggered.some(r=>r.pri==="最高"&&r.result.pass)){
    action="📉 卖出/减仓"; actionCls="sell";
  } else if(sellTriggered.length===1){
    action="⚠️ 关注风险"; actionCls="hold";
  } else if(buyReqPass.length===buyReq.length && buyPass.length>=buyResults.length*0.6){
    action="✅ 可买入"; actionCls="buy";
  } else if(buyReqPass.length===buyReq.length){
    action="👀 接近买点"; actionCls="hold";
  } else {
    action="⏸️ 持有/观望"; actionCls="hold";
  }

  // 渲染规则检查
  function renderRules(rules, type){
    return rules.map(r=>{
      const p=r.result.pass;
      const icon = type==="buy" ? (p?'✅':'❌') : type==="sell"||type==="clear" ? (p?'🔴':'✅') : '';
      const cls = type==="buy" ? (p?"pass":"fail") : (p?"fail":"pass");
      return `<div class="rule">
        <div class="icon ${cls}">${icon}</div>
        <div class="name">${r.name}</div>
        <div class="cond">${r.result.detail}</div>
        <div class="result ${cls}">${type==="buy"?(p?"达标":"不达标"):(p?"触发":"未触发")}</div>
      </div>`;
    }).join("");
  }

  const adviceText = m.adviceFn(d, {buyResults,sellResults,clearResults});

  return `<div class="card" data-s="${sym}">
    <div class="card-top">
      <div><span class="card-name">${d.n}</span><span class="card-sym">${d.sym} · ${d.mk}股 · ${d.sec}</span></div>
      <span class="badge ${actionCls}">${action}</span>
    </div>
    <div class="nums">
      <div><div class="l">现价</div><div class="v">${d.p}</div></div>
      <div><div class="l">PE / PEG</div><div class="v">${d.pe} / ${d.peg}</div></div>
      <div><div class="l">EPS增速(年/季)</div><div class="v">${d.eps_growth}% / ${d.eps_q_growth}%</div></div>
      <div><div class="l">ROE / RS</div><div class="v">${d.roe}% / ${d.relative_strength}</div></div>
    </div>
    <div class="nums">
      <div><div class="l">支撑</div><div class="v">${d.sup}</div></div>
      <div><div class="l">阻力</div><div class="v">${d.res}</div></div>
      <div><div class="l">止损</div><div class="v dn">${d.sl}</div></div>
      <div><div class="l">MACD / RSI</div><div class="v">${d.macd} / ${d.rsi}</div></div>
    </div>
    <div class="sec-t" style="font-size:11px;margin-top:8px">📋 买入规则检查 (${buyPass.length}/${buyResults.length} 达标)</div>
    <div class="rules">${renderRules(buyResults,"buy")}</div>
    <div class="sec-t" style="font-size:11px;margin-top:8px">📋 卖出/风险检查 (${sellTriggered.length}/${sellResults.length} 触发)</div>
    <div class="rules">${renderRules(sellResults,"sell")}</div>
    ${clearTriggered.length?`<div class="sec-t" style="font-size:11px;margin-top:8px;color:var(--red)">🔴 清仓检查 (${clearTriggered.length} 触发)</div><div class="rules">${renderRules(clearResults,"clear")}</div>`:""}
    ${d.signals.length?`<div style="font-size:10px;color:var(--cyan);margin-top:6px">${d.signals.map(s=>"· "+s).join("  ")}</div>`:""}
    ${d.risks.length?`<div style="font-size:10px;color:var(--org);margin-top:3px">${d.risks.map(r=>"⚠️ "+r).join("  ")}</div>`:""}
    <div class="verdict ${actionCls}-v">
      <b>${m.icon} ${m.name}诊断</b><br>${adviceText}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
