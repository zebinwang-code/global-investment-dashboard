<style>
:root{--bg:#0a0e17;--c1:#111827;--c2:#1a2332;--c3:#1f2b3d;--bd:#2a3548;--t1:#e5e7eb;--t2:#9ca3af;--t3:#6b7280;

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* Header */
.hd{background:var(--c1);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.hd h1{font-size:18px;background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd .ver{font-size:9px;color:var(--t3);margin-left:6px;vertical-align:super}
.hd .tm{font-size:10px;color:var(--t3)}

/* Summary bar */
.summary{display:flex;gap:6px;padding:10px 20px;background:var(--c1);border-bottom:1px solid var(--bd);overflow-x:auto}
.sm{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;text-align:center;min-width:90px}
.sm .l{font-size:8px;color:var(--t3)}.sm .v{font-size:18px;font-weight:800}.sm .s{font-size:9px;margin-top:1px}

/* Dimension toggles */
.dims{display:flex;gap:6px;padding:10px 20px;background:rgba(17,24,39,.6);border-bottom:1px solid var(--bd);flex-wrap:wrap;align-items:center}
.dims-label{font-size:10px;color:var(--t3);margin-right:4px}
.dim-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--c2);cursor:pointer;font-size:11px;color:var(--t2);transition:.2s;user-select:none;display:flex;align-items:center;gap:4px}
.dim-btn:hover{border-color:var(--blue)}
.dim-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.08)}
.dim-btn .dot{width:6px;height:6px;border-radius:50%;background:var(--bd);transition:.2s}
.dim-btn.on .dot{background:var(--cyan)}
.dim-weight{font-size:9px;color:var(--t3);margin-left:2px}

/* Macro panel */
.macro-panel{background:var(--c1);border-bottom:1px solid var(--bd);overflow:hidden;transition:max-height .3s}
.macro-toggle{padding:8px 20px;cursor:pointer;font-size:12px;color:var(--t2);display:flex;justify-content:space-between;align-items:center}
.macro-toggle:hover{color:var(--t1)}
.macro-body{padding:0 20px 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.mc{background:var(--c2);border:1px solid var(--bd);border-radius:8px;padding:8px;text-align:center}
.mc .l{font-size:8px;color:var(--t3)}.mc .v{font-size:17px;font-weight:800}.mc .s{font-size:9px;margin-top:1px}
.up{color:var(--grn)}.dn{color:var(--red)}.neu{color:var(--org)}

/* Tabs */
.tabs{display:flex;gap:4px;padding:10px 20px;background:var(--bg);position:sticky;top:52px;z-index:90}
.tab{padding:7px 16px;border-radius:8px;border:1px solid var(--bd);background:var(--c2);cursor:pointer;font-size:12px;color:var(--t2);transition:.15s;display:flex;align-items:center;gap:6px}
.tab:hover{border-color:var(--blue)}.tab.on{border-color:var(--blue);color:var(--blue);background:rgba(59,130,246,.08)}
.tab .cnt{background:var(--bd);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tab.on .cnt{background:rgba(59,130,246,.2);color:var(--blue)}

/* Content */
.wrap{max-width:960px;margin:0 auto;padding:12px 16px}

/* Action card */
.acard{background:var(--c2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;animation:fi .25s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
.acard-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.acard-info h3{font-size:16px;font-weight:700}
.acard-info .sym{font-size:10px;color:var(--t3);margin-left:4px}
.acard-info .mkt{font-size:9px;padding:2px 6px;border-radius:4px;margin-left:6px;font-weight:600}
.mkt-us{background:rgba(59,130,246,.12);color:var(--blue)}
.mkt-hk{background:rgba(236,72,153,.12);color:var(--pink)}
.mkt-a{background:rgba(245,158,11,.12);color:var(--org)}
.badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:8px;white-space:nowrap}
.badge-strong-buy{background:rgba(16,185,129,.18);color:var(--grn);border:1px solid rgba(16,185,129,.3);font-weight:800}
.badge-buy{background:rgba(16,185,129,.12);color:var(--grn);border:1px solid rgba(16,185,129,.2)}
.badge-neutral{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.2)}
.badge-reduce{background:rgba(245,158,11,.12);color:var(--org);border:1px solid rgba(245,158,11,.2)}
.badge-strong-reduce{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.25);font-weight:800}
.badge-clear{background:rgba(239,68,68,.22);color:var(--red);border:1px solid rgba(239,68,68,.4);font-weight:800}
.badge-urgent{font-size:9px;padding:2px 8px;border-radius:4px;margin-left:6px}
.urg-high{background:rgba(239,68,68,.15);color:var(--red)}
.urg-mid{background:rgba(245,158,11,.15);color:var(--org)}
.urg-low{background:rgba(59,130,246,.15);color:var(--blue)}

.pos-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pos-item{background:rgba(255,255,255,.02);padding:6px 10px;border-radius:6px;font-size:11px}
.pos-item .l{font-size:8px;color:var(--t3)}.pos-item .v{font-weight:700}

.dscore{flex:1;min-width:80px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:8px;padding:8px;text-align:center}
.dscore .l{font-size:9px;color:var(--t3);margin-bottom:2px}.dscore .v{font-size:20px;font-weight:800}
.dscore .bar{height:3px;border-radius:2px;background:var(--bd);margin-top:4px;overflow:hidden}
.dscore .bar-fill{height:100%;border-radius:2px;transition:width .3s}
.dscore.off{opacity:.25}

/* Reasons */
.reasons{font-size:11px;color:var(--t2);line-height:1.7;padding:10px 12px;background:rgba(255,255,255,.02);border-radius:8px;border-left:3px solid var(--blue)}
.reasons b{color:var(--t1);font-size:10px}
.reason-tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;margin-right:4px;font-weight:600}
.rt-pos{background:rgba(16,185,129,.1);color:var(--grn)}
.rt-neg{background:rgba(239,68,68,.1);color:var(--red)}
.rt-neu{background:rgba(245,158,11,.1);color:var(--org)}
.rt-info{background:rgba(59,130,246,.1);color:var(--blue)}

/* Detail expand */
.detail-toggle{font-size:10px;color:var(--t3);cursor:pointer;margin-top:8px;text-align:right}
.detail-toggle:hover{color:var(--cyan)}
.detail-body{display:none;margin-top:8px;font-size:10px;color:var(--t2);padding:10px;background:rgba(0,0,0,.15);border-radius:8px}
.detail-body.show{display:block}
.detail-section{margin-bottom:8px}
.detail-section .dt{font-size:9px;color:var(--t3);font-weight:700;margin-bottom:3px}
.detail-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}

/* Compact table for "other" tab */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:8px 10px;color:var(--t3);font-size:9px;font-weight:600;border-bottom:1px solid var(--bd);position:sticky;top:92px;background:var(--bg)}
.tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.tbl .sc{font-weight:700;font-size:12px}

/* Composite score big */
.comp{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.comp-score{font-size:28px;font-weight:900;min-width:48px;text-align:center}
.comp-label{font-size:10px;color:var(--t3)}
.comp-action{font-size:13px;font-weight:700}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--t3);font-size:12px}

/* Footer */
.footer{text-align:center;padding:14px;color:var(--t3);font-size:8px;border-top:1px solid var(--bd);margin-top:20px}

/* Strategy detail grid */
.strat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.strat-mini{padding:6px;background:rgba(255,255,255,.02);border-radius:6px;text-align:center}
.strat-mini .sn{font-size:9px;color:var(--t3)}.strat-mini .sv{font-size:13px;font-weight:700}
.strat-mini .sa{font-size:9px;font-weight:600;margin-top:2px}

@media(max-width:640px){.pos-row{flex-direction:column}.dim-scores{flex-direction:column}.strat-grid{grid-template-columns:repeat(2,1fr)}.macro-body{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

// ============================================================
// 分析引擎
// ============================================================

// 1. 宏观评分（对每只股票的行业相关性）
function scoreMacro(d){
  let s=5, reasons=[];
  // 象限基础分
  if(Q==="g"){s+=2;reasons.push({t:"pos",x:`宏观处于${QN[Q]}，权益友好`})}
  else if(Q==="o"){s+=0.5;reasons.push({t:"neu",x:`${QN[Q]}环境，关注通胀`})}
  else if(Q==="r"){s-=1.5;reasons.push({t:"neg",x:`${QN[Q]}环境，防御为主`})}
  else{s-=2.5;reasons.push({t:"neg",x:`${QN[Q]}环境，大幅降仓`})}
  // VIX
  if(MAC.vix<15){s+=0.5;reasons.push({t:"pos",x:`VIX=${MAC.vix}，市场平静`})}
  else if(MAC.vix>25){s-=1;reasons.push({t:"neg",x:`VIX=${MAC.vix}，波动加大`})}
  // 行业相关
  if(d.sec==="科技"&&MAC.ndxChg>0){s+=0.5;reasons.push({t:"pos",x:`纳指+${MAC.ndxChg}%利好科技`})}
  if(d.sec==="消费"&&Q!=="g"){s-=0.5;reasons.push({t:"neg",x:"非金发女孩象限不利消费"})}
  if(d.mk==="港股"&&MAC.northbound>0){s+=0.3;reasons.push({t:"pos",x:`北向净流入${MAC.northbound}亿`})}
  if(d.mk==="A股"&&MAC.sseChg>0){s+=0.3}
  s=Math.max(0,Math.min(10,s));
  return {score:+s.toFixed(1), reasons};
}

// 2. 资金异动评分
function scoreCapital(d){
  let s=5, reasons=[];
  // 北向
  if(d.north==="流入"){s+=1.2;reasons.push({t:"pos",x:"北向资金流入"})}
  else if(d.north==="流出"){s-=1.2;reasons.push({t:"neg",x:"北向资金流出"})}
  // 机构
  if(d.inst_flow==="增持"){s+=1.5;reasons.push({t:"pos",x:"机构资金增持"})}
  else if(d.inst_flow==="减持"){s-=1.5;reasons.push({t:"neg",x:"机构资金减持"})}
  // 大单
  if(d.big_order==="大额净买入"){s+=1.2;reasons.push({t:"pos",x:"大单资金净买入"})}
  else if(d.big_order==="净买入"){s+=0.6;reasons.push({t:"pos",x:"大单小幅净买入"})}
  else if(d.big_order==="净卖出"){s-=1;reasons.push({t:"neg",x:"大单资金净卖出"})}
  // 量比
  if(d.vol_r>=1.5){s+=0.8;reasons.push({t:"neu",x:`量比${d.vol_r}，显著放量`})}
  else if(d.vol_r>=1.1){s+=0.3;reasons.push({t:"pos",x:`量比${d.vol_r}，温和放量`})}
  else if(d.vol_r<=0.6){s-=0.5;reasons.push({t:"neg",x:`量比${d.vol_r}，明显缩量`})}
  // 异动
  if(d.unusual){reasons.push({t:"neu",x:"⚡ 检测到异常资金活动"})}
  s=Math.max(0,Math.min(10,s));
  return {score:+s.toFixed(1), reasons};
}

// 3. 技术面评分
function scoreTech(d){
  let s=5, reasons=[];
  // 均线
  if(d.ma20&&d.ma60){s+=1.5;reasons.push({t:"pos",x:"双均线多头排列"})}
  else if(d.ma20){s+=0.5;reasons.push({t:"pos",x:"MA20上方，MA60下方"})}
  else if(!d.ma20&&!d.ma60){s-=1.5;reasons.push({t:"neg",x:"双均线空头排列"})}
  // MACD
  if(d.macd.includes("金叉")){s+=1;reasons.push({t:"pos",x:`MACD${d.macd}`})}
  else if(d.macd==="多头"){s+=0.8;reasons.push({t:"pos",x:"MACD多头运行"})}
  else if(d.macd.includes("死叉")){s-=1.5;reasons.push({t:"neg",x:`MACD${d.macd}`})}
  else if(d.macd.includes("空")){s-=0.8;reasons.push({t:"neg",x:`MACD${d.macd}`})}
  // RSI
  if(d.rsi>70){s-=0.5;reasons.push({t:"neg",x:`RSI=${d.rsi}，超买`})}
  else if(d.rsi<30){s-=0.5;reasons.push({t:"neg",x:`RSI=${d.rsi}，超卖`})}
  else if(d.rsi>=50&&d.rsi<=65){s+=0.5;reasons.push({t:"pos",x:`RSI=${d.rsi}，偏多`})}
  else{reasons.push({t:"info",x:`RSI=${d.rsi}`})}
  // 支撑/阻力
  const distSup=(d.p-d.sup)/d.sup*100;
  if(distSup<2){reasons.push({t:"neu",x:`接近支撑位${d.sup}(${distSup.toFixed(1)}%)`})}
  const distRes=(d.res-d.p)/d.p*100;
  if(distRes<3){s+=0.3;reasons.push({t:"info",x:`接近阻力位${d.res}`})}
  // 52周高点距离
  const from52=(d.h52-d.p)/d.h52*100;
  if(from52<5){s+=0.3;reasons.push({t:"pos",x:"接近52周高点"})}
  else if(from52>30){s-=0.3;reasons.push({t:"neg",x:`距52周高点-${from52.toFixed(0)}%`})}
  s=Math.max(0,Math.min(10,s));
  return {score:+s.toFixed(1), reasons};
}

// 4. 消息/机构评分
function scoreNews(d){
  let s=5, reasons=[];
  // 新闻情绪
  const posCnt=d.news.filter(n=>n.s>0).length, negCnt=d.news.filter(n=>n.s<0).length;
  if(posCnt>negCnt){s+=(posCnt-negCnt)*0.6;reasons.push({t:"pos",x:`近期${posCnt}条利好消息`})}
  else if(negCnt>posCnt){s-=(negCnt-posCnt)*0.8;reasons.push({t:"neg",x:`近期${negCnt}条利空消息`})}
  d.news.forEach(n=>{reasons.push({t:n.s>0?"pos":n.s<0?"neg":"neu",x:n.t})});
  // 机构评级
  const buyR=d.inst.filter(i=>i.r==="买入"||i.r==="增持").length;
  const sellR=d.inst.filter(i=>i.r==="卖出"||i.r==="减持").length;
  if(buyR>0){s+=buyR*0.5;reasons.push({t:"pos",x:`${buyR}家机构看多`})}
  if(sellR>0){s-=sellR*0.8;reasons.push({t:"neg",x:`${sellR}家机构看空`})}
  // 目标价
  const avgTp=d.inst.reduce((a,i)=>a+i.tp,0)/d.inst.length;
  const upside=((avgTp-d.p)/d.p*100).toFixed(1);
  if(upside>10){s+=0.5;reasons.push({t:"pos",x:`机构目标均价${avgTp.toFixed(0)}，上行空间${upside}%`})}
  else if(upside<0){s-=0.5;reasons.push({t:"neg",x:`机构目标均价${avgTp.toFixed(0)}，下行${upside}%`})}
  s=Math.max(0,Math.min(10,s));
  return {score:+s.toFixed(1), reasons};
}

// 5. 策略模型评分（6大模型共识）
function scoreStrategy(d){
  let reasons=[];
  // 基本面辅助
  function calcFund(d){
    let s=5;
    if(d.roe>=20)s+=1.5;else if(d.roe>=15)s+=1;else if(d.roe>=10)s+=0.5;
    if(d.eps_g>=25)s+=1.5;else if(d.eps_g>=15)s+=1;else if(d.eps_g>=5)s+=0.3;
    if(d.peg<=0.5)s+=1;else if(d.peg<=1)s+=0.5;else if(d.peg>2.5)s-=1;
    if(d.debt<0.3)s+=0.3;else if(d.debt>0.7)s-=0.5;
    return Math.max(0,Math.min(10,s));
  }
  const fund=calcFund(d);
  const models=[
    {id:"db",icon:"🎯",name:"达里奥+巴菲特",fn(){
      let sc=5;
      if(fund>=7)sc+=1.5; if(d.peg<=1.2)sc+=1; if(d.ma20)sc+=0.5; if(fund<5)sc-=2; if(d.peg>2)sc-=1.5; if(Q==="s")sc-=1;
      const act=sc>=7?"买入":sc>=5.5?"持有":sc>=4?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
    {id:"turtle",icon:"🐢",name:"海龟交易",fn(){
      let sc=5;
      if(d.p>d.h20*0.99)sc+=2; if(d.ma20)sc+=1; if(d.vol_r>=1)sc+=0.5; if(d.p<d.l10)sc-=2; if(!d.ma20&&!d.ma60)sc-=1.5;
      const act=sc>=7?"买入":sc>=5?"持有":sc>=3.5?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
    {id:"liver",icon:"📊",name:"利弗莫尔",fn(){
      let sc=5;
      if(d.vol_r>=1.3)sc+=1.5; if(d.p>d.h20*0.97)sc+=1; if(d.p<d.sup*1.01&&d.vol_r>1.2)sc-=2;
      if(d.rsi>80&&d.vol_r>2)sc-=1.5;
      const act=sc>=7?"买入":sc>=5?"持有":sc>=3.5?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
    {id:"soros",icon:"🌊",name:"索罗斯反身性",fn(){
      let sc=5;
      if(d.ma20&&d.vol_r>=1.1&&(d.north==="流入"||d.north==="N/A"))sc+=2;
      if(MAC.fearGreed<25&&fund>=6)sc+=1.5; if(d.rsi<35&&d.north==="流入")sc+=1;
      if(d.peg>2.5&&d.rsi>70)sc-=2; if(!d.ma20&&!d.ma60&&d.vol_r>1.5)sc-=2;
      const act=sc>=7?"买入":sc>=5?"持有":sc>=3.5?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
    {id:"lynch",icon:"📈",name:"林奇GARP",fn(){
      let sc=5;
      if(d.peg<=1)sc+=2; if(d.eps_g>=15)sc+=1; if(d.roe>=17)sc+=0.5;
      if(d.eps_g<15&&d.peg>1.5)sc-=1.5; if(d.peg>2)sc-=1; if(d.eps_qg<0)sc-=2;
      const act=sc>=7?"买入":sc>=5?"持有":sc>=3.5?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
    {id:"can",icon:"🚀",name:"CANSLIM",fn(){
      let sc=5;
      if(d.eps_qg>=25)sc+=1.5; if(d.eps_g>=25&&d.roe>=17)sc+=1; if(d.vol_r>=1.4)sc+=0.5;
      if(Q==="g"||Q==="o")sc+=0.5; else sc-=1.5; if(d.rsi>70)sc-=0.5;
      const act=sc>=7?"买入":sc>=5?"持有":sc>=3.5?"减仓":"卖出";
      return {score:Math.max(0,Math.min(10,+sc.toFixed(1))),action:act}}},
  ];
  const results=models.map(m=>({...m,...m.fn()}));
  const avg=results.reduce((a,r)=>a+r.score,0)/results.length;
  const buyCnt=results.filter(r=>r.action==="买入").length;
  const sellCnt=results.filter(r=>r.action==="卖出"||r.action==="减仓").length;
  if(buyCnt>=4)reasons.push({t:"pos",x:`${buyCnt}/6模型看多`});
  else if(buyCnt>=2)reasons.push({t:"pos",x:`${buyCnt}/6模型看多`});
  if(sellCnt>=3)reasons.push({t:"neg",x:`${sellCnt}/6模型看空`});
  else if(sellCnt>=1)reasons.push({t:"neu",x:`${sellCnt}/6模型看空`});
  reasons.push({t:"info",x:`基本面评分${fund.toFixed(1)} | PEG=${d.peg} | ROE=${d.roe}%`});
  return {score:+avg.toFixed(1), reasons, models:results};
}

// ============================================================
// 综合评分 & 六级决策引擎
// ============================================================
// 评级体系:
//   强烈买入 (strong-buy)  — 多维共振看多 + 无重大风险
//   买入     (buy)         — 多数维度偏多 + 风险可控
//   中性     (neutral)     — 多空交织或信号不足
//   考虑减仓 (reduce)      — 多数维度偏空或出现预警
//   强烈减仓 (strong-reduce)— 多维共振看空 + 持仓亏损
//   清仓     (clear)       — 极端风险或基本面崩塌
//
// 决策逻辑分三层:
//   Layer 1: 加权综合分 → 初步评级
//   Layer 2: 多维交叉验证 → 调整评级（共振增强/背离降级）
//   Layer 3: 风控覆盖 → 止损/黑天鹅强制覆盖

function analyze(d){
  const dims={
    macro:scoreMacro(d), capital:scoreCapital(d), tech:scoreTech(d),
    news:scoreNews(d), strategy:scoreStrategy(d)
  };

  // === 盈亏 ===
  const pnl=(d.p-d.cost)*d.qty;
  const pnlPct=((d.p-d.cost)/d.cost*100);

  // === Layer 1: 加权综合分 ===
  let totalW=0, totalS=0;
  DIMS.forEach(dm=>{
    if(!dm.on)return;
    totalW+=dm.weight; totalS+=dims[dm.id].score*dm.weight;
  });
  const composite=totalW>0?totalS/totalW:5;

  // 初步评级（纯分数线）
  let level; // 0=清仓 1=强烈减仓 2=考虑减仓 3=中性 4=买入 5=强烈买入
  if(composite>=8) level=5;
  else if(composite>=6.8) level=4;
  else if(composite>=5.2) level=3;
  else if(composite>=4) level=2;
  else if(composite>=2.5) level=1;
  else level=0;

  const chain=[]; // 推理链
  chain.push({step:"基础评分",detail:`五维加权综合 = ${composite.toFixed(1)}/10`,result:["清仓","强烈减仓","考虑减仓","中性","买入","强烈买入"][level]});

  // === Layer 2: 多维交叉验证 ===
  const enabled=DIMS.filter(dm=>dm.on);
  const scores=enabled.map(dm=>({id:dm.id,name:dm.name,score:dims[dm.id].score}));
  const bullish=scores.filter(s=>s.score>=7);     // 看多维度
  const bearish=scores.filter(s=>s.score<=3.5);    // 看空维度
  const critical=scores.filter(s=>s.score<=2);     // 危险维度

  // 规则2a: 多维共振增强 — ≥3个维度同方向时升/降一级
  if(bullish.length>=3&&level>=3&&level<5){
    level+=1;
    chain.push({step:"多头共振",detail:`${bullish.map(s=>s.name+s.score).join("、")} 均≥7分，${bullish.length}维看多共振`,result:"↑ 升一级"});
  }
  if(bearish.length>=3&&level<=3&&level>0){
    level-=1;
    chain.push({step:"空头共振",detail:`${bearish.map(s=>s.name+s.score).join("、")} 均≤3.5分，${bearish.length}维看空共振`,result:"↓ 降一级"});
  }

  // 规则2b: 关键维度一票否决 — 资金面或技术面极差(≤2)时，不能给买入
  const vetoDims=["capital","tech"];
  const vetoHit=scores.filter(s=>vetoDims.includes(s.id)&&s.score<=2);
  if(vetoHit.length>0&&level>=4){
    level=3;
    chain.push({step:"关键维度否决",detail:`${vetoHit.map(s=>s.name+"仅"+s.score).join("、")}，资金/技术面过差不宜买入`,result:"↓ 降至中性"});
  }

  // 规则2c: 多空背离降级 — 同时有强多和强空维度，信号矛盾降至中性
  if(bullish.length>=2&&bearish.length>=2&&(level>=4||level<=1)){
    level=level>=4?3:2;
    chain.push({step:"多空背离",detail:`${bullish.length}维看多 vs ${bearish.length}维看空，信号矛盾需观察`,result:"→ 回归中间"});
  }

  // 规则2d: 策略模型共识增强
  const stratModels=dims.strategy.models||[];
  const modelBuy=stratModels.filter(m=>m.action==="买入").length;
  const modelSell=stratModels.filter(m=>m.action==="卖出"||m.action==="减仓").length;
  if(modelBuy>=5&&level>=3&&level<5){
    level+=1;
    chain.push({step:"策略共识",detail:`${modelBuy}/6模型看多，形成强共识`,result:"↑ 升一级"});
  }
  if(modelSell>=4&&level<=3&&level>0){
    level-=1;
    chain.push({step:"策略共识",detail:`${modelSell}/6模型看空，形成看空共识`,result:"↓ 降一级"});
  }

  // === Layer 3: 风控覆盖 ===

  // 规则3a: 硬性止损 — 亏损>20%且技术面破位 → 强制强烈减仓+
  if(pnlPct<-20&&dims.tech.score<4){
    level=Math.min(level,1);
    chain.push({step:"止损触发",detail:`浮亏${pnlPct.toFixed(1)}%超过-20%，且技术面${dims.tech.score}分破位`,result:"⚠ 强制≤强烈减仓"});
  }
  // 规则3b: 深度亏损 — 亏损>10%且无看多信号 → 至少考虑减仓
  else if(pnlPct<-10&&bullish.length===0){
    level=Math.min(level,2);
    chain.push({step:"亏损预警",detail:`浮亏${pnlPct.toFixed(1)}%且无维度看多(≥7分)`,result:"⚠ 至少考虑减仓"});
  }

  // 规则3c: 多风险叠加 — 3个以上风险标签 → 降一级
  if(d.risks.length>=3&&level>=3){
    level-=1;
    chain.push({step:"风险叠加",detail:`存在${d.risks.length}项风险: ${d.risks.slice(0,3).join("、")}`,result:"↓ 降一级"});
  }

  // 规则3d: 危险维度 — 任何维度≤2分 → 不高于中性
  if(critical.length>0&&level>3){
    level=3;
    chain.push({step:"极端预警",detail:`${critical.map(s=>s.name+"仅"+s.score).join("、")}，存在极端风险`,result:"↓ 降至中性"});
  }

  // 规则3e: 宏观恶劣 — 滞胀象限 → 全局上限为"买入"（不给强烈买入）
  if(Q==="s"&&level>=5){
    level=4;
    chain.push({step:"宏观压制",detail:`滞胀象限下系统性风险高，压制最高评级`,result:"↓ 上限买入"});
  }

  // Clamp
  level=Math.max(0,Math.min(5,level));

  // === 映射到输出 ===
  const LEVELS=[
    {action:"清仓",     cls:"clear",         urgency:"high",  icon:"🔴"},
    {action:"强烈减仓", cls:"strong-reduce",  urgency:"high",  icon:"🟠"},
    {action:"考虑减仓", cls:"reduce",         urgency:"mid",   icon:"🟡"},
    {action:"中性",     cls:"neutral",        urgency:"low",   icon:"⚪"},
    {action:"买入",     cls:"buy",            urgency:"mid",   icon:"🟢"},
    {action:"强烈买入", cls:"strong-buy",     urgency:"low",   icon:"🟢"},
  ];
  const L=LEVELS[level];

  // 生成综合推理摘要
  const summary=buildSummary(d, dims, level, pnlPct, chain);

  // 需要操作 = 非中性
  const needAction=level!==3;

  return {
    dims, composite:+composite.toFixed(1), pnl, pnlPct,
    action:L.action, actionCls:L.cls, urgency:L.urgency, actionIcon:L.icon,
    level, chain, summary, needAction
  };
}

// 生成自然语言推理摘要
function buildSummary(d, dims, level, pnlPct, chain){
  const parts=[];
  const en=DIMS.filter(dm=>dm.on);

  // 开头：总览
  const bullNames=en.filter(dm=>dims[dm.id].score>=7).map(dm=>dm.name);
  const bearNames=en.filter(dm=>dims[dm.id].score<=3.5).map(dm=>dm.name);

  if(bullNames.length>0) parts.push(`<b>利多因素：</b>${bullNames.join("、")}表现积极(≥7分)`);
  if(bearNames.length>0) parts.push(`<b>利空因素：</b>${bearNames.join("、")}发出警示(≤3.5分)`);
  if(bullNames.length===0&&bearNames.length===0) parts.push("<b>信号中性：</b>各维度均在中间区间，方向不明确");

  // 推理过程
  if(chain.length>1){
    const adjustments=chain.slice(1);
    parts.push(`<b>推理链：</b>基础评分${chain[0].result} → ${adjustments.map(c=>`${c.step}(${c.result})`).join(" → ")} → 最终<b>${["清仓","强烈减仓","考虑减仓","中性","买入","强烈买入"][level]}</b>`);
  }

  // 持仓盈亏语境
  if(pnlPct>=20) parts.push(`<b>持仓：</b>浮盈${pnlPct.toFixed(1)}%，注意止盈保护`);
  else if(pnlPct<=-10) parts.push(`<b>持仓：</b>浮亏${pnlPct.toFixed(1)}%，关注止损纪律`);

  // 关键数据点
  const keyPoints=[];
  if(dims.tech.score!==undefined) keyPoints.push(`MACD=${d.macd}`);
  if(d.rsi) keyPoints.push(`RSI=${d.rsi}`);
  if(d.peg) keyPoints.push(`PEG=${d.peg}`);
  const avgTp=d.inst.reduce((a,i)=>a+i.tp,0)/d.inst.length;
  const upside=((avgTp-d.p)/d.p*100);
  keyPoints.push(`目标价${avgTp.toFixed(0)}(${upside>=0?"+":""}${upside.toFixed(1)}%)`);
  parts.push(`<b>关键指标：</b>${keyPoints.join(" | ")}`);

  return parts.join("<br>");
}

// ============================================================
// 渲染
// ============================================================
function render(){
  // Clock
  document.getElementById("clock").textContent=new Date().toLocaleString("zh-CN");

  // Analyze all holdings
  const analyzed=H.map(d=>({...d, analysis:analyze(d)}));
  const actionList=analyzed.filter(d=>d.analysis.needAction).sort((a,b)=>{
    // 清仓/强烈减仓排前面，强烈买入/买入排后面
    const urgOrder=a.analysis.level<=2&&b.analysis.level<=2
      ? a.analysis.level-b.analysis.level   // 两个都是卖方，更紧急的在前
      : a.analysis.level>=4&&b.analysis.level>=4
      ? b.analysis.level-a.analysis.level   // 两个都是买方，更强的在前
      : a.analysis.level-b.analysis.level;  // 卖方排在买方前
    return urgOrder;
  });
  const otherList=analyzed.filter(d=>!d.analysis.needAction);

  // Summary
  const totalVal=analyzed.reduce((a,d)=>a+d.p*d.qty,0);
  const totalCost=analyzed.reduce((a,d)=>a+d.cost*d.qty,0);
  const totalPnl=totalVal-totalCost;
  const totalPnlPct=(totalPnl/totalCost*100);
  document.getElementById("summary").innerHTML=`
    <div class="sm"><div class="l">持仓数</div><div class="v">${H.length}</div></div>
    <div class="sm"><div class="l">需操作</div><div class="v" style="color:${actionList.length?'var(--org)':'var(--grn)'}">${actionList.length}</div></div>
    <div class="sm"><div class="l">总市值</div><div class="v" style="font-size:14px">${(totalVal/10000).toFixed(1)}万</div></div>
    <div class="sm"><div class="l">总盈亏</div><div class="v ${totalPnl>=0?'up':'dn'}" style="font-size:14px">${totalPnl>=0?'+':''}${(totalPnl/10000).toFixed(1)}万</div><div class="s ${totalPnlPct>=0?'up':'dn'}">${totalPnlPct>=0?'+':''}${totalPnlPct.toFixed(1)}%</div></div>
    <div class="sm"><div class="l">宏观象限</div><div class="v" style="font-size:14px">${QN[Q]}</div></div>
    <div class="sm"><div class="l">恐贪指数</div><div class="v ${MAC.fearGreed>60?'up':MAC.fearGreed<40?'dn':'neu'}" style="font-size:16px">${MAC.fearGreed}</div><div class="s">${MAC.fearGreed>70?"极贪":MAC.fearGreed>55?"贪婪":MAC.fearGreed>45?"中性":MAC.fearGreed>25?"恐惧":"极恐"}</div></div>`;

  // Dimension toggles
  document.getElementById("dims").innerHTML=`<span class="dims-label">分析维度：</span>`+DIMS.map((dm,i)=>
    `<div class="dim-btn ${dm.on?'on':''}" onclick="toggleDim(${i})"><span class="dot"></span>${dm.icon} ${dm.name}<span class="dim-weight">${dm.on?dm.weight+'%':''}</span></div>`
  ).join("");

  // Macro
  renderMacro();

  // Tabs
  document.getElementById("tabs").innerHTML=`
    <div class="tab ${curTab==='action'?'on':''}" onclick="curTab='action';render()">🎯 需要操作<span class="cnt">${actionList.length}</span></div>
    <div class="tab ${curTab==='other'?'on':''}" onclick="curTab='other';render()">📋 其他持仓<span class="cnt">${otherList.length}</span></div>`;

  // Content
  const el=document.getElementById("content");
  if(curTab==="action"){
    if(!actionList.length){el.innerHTML='<div class="empty">所有持仓状态良好，暂无需要操作的标的</div>';return}
    el.innerHTML=actionList.map(renderActionCard).join("");
  }else{
    if(!otherList.length){el.innerHTML='<div class="empty">所有持仓都有操作建议，请查看"需要操作"标签</div>';return}
    el.innerHTML=renderOtherTable(otherList);
  }
  document.getElementById("footer").textContent=`AI持仓决策助手 v1 | ${DIMS.filter(d=>d.on).length}维分析 | ${QN[Q]}象限 | 仅供参考，不构成投资建议`;
}

function renderMacro(){
  const items=[
    {l:"VIX恐慌",v:MAC.vix,s:MAC.vix>25?"高波动":MAC.vix>18?"正常":"平静",c:MAC.vix>25?"dn":"up"},
    {l:"美10Y",v:MAC.us10y+"%",s:"收益率",c:""},
    {l:"美元指数",v:MAC.dxy,s:(MAC.dxy>104?"+":"")+"强势",c:MAC.dxy>104?"dn":"up"},
    {l:"人民币",v:MAC.cny,s:"兑美元",c:""},
    {l:"S&P500",v:MAC.sp500,s:(MAC.sp500Chg>0?"+":"")+MAC.sp500Chg+"%",c:MAC.sp500Chg>=0?"up":"dn"},
    {l:"纳斯达克",v:MAC.ndx,s:(MAC.ndxChg>0?"+":"")+MAC.ndxChg+"%",c:MAC.ndxChg>=0?"up":"dn"},
    {l:"恒生指数",v:MAC.hsi,s:(MAC.hsiChg>0?"+":"")+MAC.hsiChg+"%",c:MAC.hsiChg>=0?"up":"dn"},
    {l:"上证指数",v:MAC.sse,s:(MAC.sseChg>0?"+":"")+MAC.sseChg+"%",c:MAC.sseChg>=0?"up":"dn"},
    {l:"恐贪指数",v:MAC.fearGreed,s:MAC.fearGreed>70?"极贪":MAC.fearGreed>55?"贪婪":MAC.fearGreed>45?"中性":MAC.fearGreed>25?"恐惧":"极恐",c:MAC.fearGreed>55?"up":MAC.fearGreed<40?"dn":"neu"},
    {l:"北向资金",v:MAC.northbound,s:"亿元",c:MAC.northbound>0?"up":"dn"},
    {l:"两融余额",v:MAC.margin_balance,s:"万亿",c:""},
    {l:"宏观象限",v:QN[Q],s:"达里奥框架",c:Q==="g"?"up":Q==="s"?"dn":"neu"},
  ];
  document.getElementById("macroBody").innerHTML=items.map(m=>
    `<div class="mc"><div class="l">${m.l}</div><div class="v ${m.c}">${m.v}</div><div class="s ${m.c}">${m.s}</div></div>`
  ).join("");
  document.getElementById("macroBody").style.display=macroOpen?"grid":"none";
  document.getElementById("macroArrow").textContent=macroOpen?"▴":"▾";
}

function scoreColor(s){return s>=8?'var(--grn)':s>=6.5?'var(--teal)':s>=5?'var(--cyan)':s>=3.5?'var(--org)':'var(--red)'}
function levelColor(l){return l>=5?'var(--grn)':l>=4?'var(--teal)':l>=3?'var(--cyan)':l>=2?'var(--org)':'var(--red)'}

function renderActionCard(d){
  const a=d.analysis;
  const pnlStr=`${a.pnl>=0?'+':''}${a.pnl.toFixed(0)}`;
  const pnlPctStr=`${a.pnlPct>=0?'+':''}${a.pnlPct.toFixed(1)}%`;
  const mktCls=d.mk==="美股"?"us":d.mk==="港股"?"hk":"a";
  const urgLabel={high:"紧急",mid:"关注",low:""}[a.urgency]||"";
  const urgCls={high:"urg-high",mid:"urg-mid",low:"urg-low"}[a.urgency]||"";

  // Dimension scores HTML
  const dimHtml=DIMS.map(dm=>{
    const ds=a.dims[dm.id];
    const isOn=dm.on;
    return `<div class="dscore ${isOn?'':'off'}"><div class="l">${dm.icon} ${dm.name}</div><div class="v" style="color:${isOn?scoreColor(ds.score):'var(--t3)'}">${ds.score}</div><div class="bar"><div class="bar-fill" style="width:${ds.score*10}%;background:${scoreColor(ds.score)}"></div></div></div>`;
  }).join("");

  // Top reasons (collect from all enabled dims, prioritize neg for sell / pos for buy)
  const allReasons=[];
  const prioritize=a.level>=4?"pos":"neg";
  DIMS.forEach(dm=>{if(dm.on){
    const rs=a.dims[dm.id].reasons;
    const prio=rs.filter(r=>r.t===prioritize).slice(0,2);
    const rest=rs.filter(r=>r.t!==prioritize).slice(0,1);
    prio.concat(rest).forEach(r=>allReasons.push(r));
  }});
  const topReasons=allReasons.slice(0,8);
  const reasonsHtml=topReasons.map(r=>`<span class="reason-tag rt-${r.t}">${r.t==='pos'?'▲':r.t==='neg'?'▼':r.t==='neu'?'●':'ℹ'}</span>${r.x}`).join("<br>");

  // Strategy models detail
  const stratModels=a.dims.strategy.models||[];
  const stratHtml=stratModels.map(m=>{
    const ac=m.action==="买入"?"up":m.action==="卖出"||m.action==="减仓"?"dn":"";
    return `<div class="strat-mini"><div class="sn">${m.icon} ${m.name}</div><div class="sv" style="color:${scoreColor(m.score)}">${m.score}</div><div class="sa ${ac}">${m.action}</div></div>`;
  }).join("");

  const uid=d.sym.replace(/\./g,'_');
  return `<div class="acard">
    <div class="acard-top">
      <div class="acard-info"><h3>${d.n}<span class="sym">${d.sym}</span><span class="mkt mkt-${mktCls}">${d.mk}</span></h3></div>
      <div><span class="badge badge-${a.actionCls}">${a.actionIcon} ${a.action}</span>${urgLabel?`<span class="badge-urgent ${urgCls}">${urgLabel}</span>`:''}</div>
    </div>
    <div class="pos-row">
      <div class="pos-item"><span class="l">持仓 </span><span class="v">${d.qty}股</span></div>
      <div class="pos-item"><span class="l">成本 </span><span class="v">${d.cost}</span></div>
      <div class="pos-item"><span class="l">现价 </span><span class="v">${d.p}</span></div>
      <div class="pos-item"><span class="l">盈亏 </span><span class="v ${a.pnl>=0?'up':'dn'}">${pnlStr}</span></div>
      <div class="pos-item"><span class="l">收益率 </span><span class="v ${a.pnlPct>=0?'up':'dn'}">${pnlPctStr}</span></div>
    </div>
    <div class="comp">
      <div class="comp-score" style="color:${scoreColor(a.composite)}">${a.composite}</div>
      <div><div class="comp-label">综合评分（${DIMS.filter(dm=>dm.on).length}维加权）</div><div class="comp-action" style="color:${scoreColor(a.composite)}">${a.action}</div></div>
    </div>
    <div class="dim-scores">${dimHtml}</div>
    <div class="reasons">${a.summary}</div>
    <div style="margin-top:8px;font-size:10px;color:var(--t2);line-height:1.6">${reasonsHtml}</div>
    <div class="detail-toggle" onclick="toggleDetail('${uid}')">📋 展开决策推理链 + 策略模型 ▾</div>
    <div class="detail-body" id="det_${uid}">
      <div class="detail-section"><div class="dt">🔗 决策推理链</div>${a.chain.map((c,i)=>`<div class="detail-row" style="padding:3px 0"><span style="color:var(--cyan);min-width:90px">${i===0?'①':i===1?'②':i===2?'③':i===3?'④':'⑤'} ${c.step}</span><span style="flex:1;color:var(--t2)">${c.detail}</span><span style="min-width:70px;text-align:right;font-weight:700;color:${c.result.includes("↑")||c.result.includes("强烈买入")||c.result.includes("买入")?'var(--grn)':c.result.includes("↓")||c.result.includes("强制")?'var(--red)':'var(--cyan)'}">${c.result}</span></div>`).join("")}</div>
      <div class="detail-section"><div class="dt">🎯 六大策略模型</div><div class="strat-grid">${stratHtml}</div></div>
      <div class="detail-section"><div class="dt">📍 关键价位</div><div class="detail-row"><span>支撑位</span><span style="color:var(--grn)">${d.sup}</span></div><div class="detail-row"><span>阻力位</span><span style="color:var(--red)">${d.res}</span></div><div class="detail-row"><span>52周高</span><span>${d.h52}</span></div></div>
      <div class="detail-section"><div class="dt">🏦 机构观点</div>${d.inst.map(i=>`<div class="detail-row"><span>${i.f}</span><span style="color:${i.r==='买入'||i.r==='增持'?'var(--grn)':i.r==='卖出'||i.r==='减持'?'var(--red)':'var(--t2)'}">${i.r} | 目标${i.tp}</span></div>`).join("")}</div>
    </div>
  </div>`;
}

function renderOtherTable(list){
  const rows=list.map(d=>{
    const a=d.analysis;
    const pnlPctStr=`${a.pnlPct>=0?'+':''}${a.pnlPct.toFixed(1)}%`;
    const mktCls=d.mk==="美股"?"us":d.mk==="港股"?"hk":"a";
    return `<tr>
      <td><b>${d.n}</b><span class="sym" style="color:var(--t3);font-size:9px;margin-left:4px">${d.sym}</span><span class="mkt mkt-${mktCls}" style="font-size:8px;padding:1px 4px;margin-left:4px">${d.mk}</span></td>
      <td>${d.p}</td>
      <td class="${a.pnlPct>=0?'up':'dn'}">${pnlPctStr}</td>
      <td class="sc" style="color:${scoreColor(a.composite)}">${a.composite}</td>
      ${DIMS.map(dm=>`<td class="sc" style="color:${dm.on?scoreColor(a.dims[dm.id].score):'var(--t3)'};opacity:${dm.on?1:0.3}">${a.dims[dm.id].score}</td>`).join("")}
      <td><span class="badge badge-${a.actionCls}" style="font-size:9px;padding:2px 8px">${a.actionIcon} ${a.action}</span></td>
    </tr>`;
  }).join("");
  return `<table class="tbl"><thead><tr><th>标的</th><th>现价</th><th>盈亏</th><th>综合</th>${DIMS.map(dm=>`<th>${dm.icon}</th>`).join("")}<th>状态</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ============================================================
// 事件
// ============================================================
function toggleDim(i){DIMS[i].on=!DIMS[i].on;render()}
function toggleDetail(uid){
  const el=document.getElementById("det_"+uid);
  el.classList.toggle("show");
}
document.getElementById("macroToggle").onclick=()=>{macroOpen=!macroOpen;renderMacro()};

// ============================================================
// 初始化
// ============================================================
render();
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleString("zh-CN")},1000);
</script>
